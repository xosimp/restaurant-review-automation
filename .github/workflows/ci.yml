name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Compile every module
        run: python -m py_compile *.py

      - name: Run tests
        run: pytest tests/ -v
        env:
          # Tests must never touch real services; empty keys force every
          # AI/email path onto its offline fallback.
          ANTHROPIC_API_KEY: ""
          RESEND_API_KEY: ""
