<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verify &mdash; Cavnar AI</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,#edddd0 0%,#f2ece4 30%,#ede8df 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:white;border-radius:14px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08)}.logo{text-align:center;margin-bottom:28px;font-family:'DM Serif Display',serif;font-size:24px;color:#0e0c0a}.logo span{color:#c84b2f}h2{font-size:18px;font-weight:700;color:#0e0c0a;margin-bottom:8px;text-align:center}p{font-size:13px;color:#7a736a;text-align:center;margin-bottom:24px;line-height:1.6}.code-input{display:flex;gap:8px;justify-content:center;margin-bottom:20px}.code-input input{width:46px;height:54px;text-align:center;font-size:24px;font-weight:700;border:2px solid #e0dbd0;border-radius:8px;font-family:monospace;color:#0e0c0a;outline:none;transition:border-color .15s}.code-input input:focus{border-color:#c84b2f}.btn{width:100%;padding:12px;background:#c84b2f;color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:background .15s}.btn:hover{background:#a83d25}.btn-link{width:100%;padding:10px;background:none;color:#7a736a;border:1px solid #e0dbd0;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}.error{color:#c0392b;font-size:13px;text-align:center;margin-bottom:16px;padding:10px;background:#fdf0ef;border-radius:6px;border:1px solid #f5c6c2}.remember{display:flex;align-items:center;gap:8px;font-size:12px;color:#7a736a;margin-bottom:16px;justify-content:center;cursor:pointer}.hint{font-size:11px;color:#7a736a;text-align:center;margin-top:8px}</style></head><body><div class="card"><div class="logo">Cavnar <span>AI</span></div><h2>Check your email</h2><p>We sent a 6-digit code to<br><strong>{{ masked_email }}</strong><br>Enter it below to sign in.</p>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="POST" action="/verify-2fa" id="twofa-form"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input type="hidden" name="pending_token" value="{{ pending_token }}"><input type="hidden" name="next_url" value="{{ next_url }}"><div class="code-input"><input type="text" maxlength="1" id="c0" inputmode="numeric" autocomplete="one-time-code"><input type="text" maxlength="1" id="c1" inputmode="numeric"><input type="text" maxlength="1" id="c2" inputmode="numeric"><input type="text" maxlength="1" id="c3" inputmode="numeric"><input type="text" maxlength="1" id="c4" inputmode="numeric"><input type="text" maxlength="1" id="c5" inputmode="numeric"></div><input type="hidden" name="code" id="full-code"><label class="remember"><input type="checkbox" name="remember_device" id="remember" value="1" checked> Remember this device for 30 days</label><button type="submit" class="btn">Verify &rarr;</button><button type="button" class="btn-link" onclick="resendCode()">Resend code</button></form><p class="hint"><a href="/login" style="color:#7a736a">Back to login</a></p></div><script>var inputs=document.querySelectorAll('.code-input input');inputs.forEach(function(inp,i){  inp.addEventListener('input',function(){    if(inp.value.length===1&&i<5)inputs[i+1].focus();    var code='';inputs.forEach(function(x){code+=x.value;});    document.getElementById('full-code').value=code;    if(code.length===6){setTimeout(function(){document.getElementById('twofa-form').submit();},1200);}  });  inp.addEventListener('keydown',function(e){    if(e.key==='Backspace'&&!inp.value&&i>0)inputs[i-1].focus();  });  inp.addEventListener('paste',function(e){    var t=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);    for(var j=0;j<t.length;j++){if(inputs[j])inputs[j].value=t[j];}    document.getElementById('full-code').value=t;    if(t.length===6){setTimeout(function(){document.getElementById('twofa-form').submit();},1200);}    e.preventDefault();  });});inputs[0].focus();function resendCode(){  fetch('/resend-2fa',{method:'POST',headers:{'Content-Type':'application/json'},    body:JSON.stringify({pending_token:(document.querySelector('[name=pending_token]')||{}).value||''})})    .then(function(r){return r.json();}).then(function(d){      if(d.ok)alert('New code sent!');else alert('Could not resend. Try logging in again.');    });}</script></body></html>
